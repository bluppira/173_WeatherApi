<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geolocation</title>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js" integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <h3>Nama : Safira Dwi Khairunisa</h3>
    <h3>NIM : 20240140173</h3>

    kota : <p id="lokasi"></p>
    <br>
    negara : <p id="negara"></p>

    <script>
        const kota = "Jakarta";
        const urlapi = "https://api.maptiler.com/geocoding/"+kota+".json?key=q5uL9oIJZRI5kbwgzLN6";

        $.ajax({
            url : urlapi,
            method : "GET",
            success : function(data){
                console.log(data);
                const l = document.getElementById("lokasi");
                const n = document.getElementById("negara");
                let lokasi = data.features[0].matching_text;
                let negara = data.features[0].geometry.coordinates;
                l.innerHTML = lokasi;
                n.innerHTML = negara;
            },
            error : function(error){
                console.log(error);
            }

        })
    </script>

</body>
</html>
